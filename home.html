<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issues Tracker | Home</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <!-- tailwind+daisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<body class="bg-gray-100 min-h-screen">
    <header class="bg-white shadow-sm">
        <div class="navbar bg-base-100 shadow-sm">
            <div class="flex-1 flex items-center gap-2">
                <img class="w-8" src="./assets/github-logo.png" alt="">
                <h1 class="text-xl font-semibold">GitHub Issues Tracker</h1>
            </div>
            <div class="flex gap-2">
                <input id="input-search" type="text" placeholder="Search issues..."
                    class="input input-bordered w-24 md:w-auto" />
                <button id="btn-search" class="btn btn-primary">+ Search</button>
            </div>
        </div>
    </header>
    <main class="w-9/12 mx-auto mt-[60px]">
        <section>
            <div class="flex flex-col md:flex-row gap-4 mt-4  bg-white p-4 shadow-sm rounded-lg">
                <button class="btn btn-primary w-40 py-5 mr-2 rounded text-lg  text-white" id="all-filter-btn">
                    All
                </button>

                <button class="btn w-40 py-5 mr-2 rounded text-lg text-gray-500 bg-gray shadow-sm" id="open-filter-btn">
                    Open
                </button>

                <button class="btn w-40 py-5 rounded text-gray-500 text-lg bg-gray" id="closed-filter-btn">
                    Closed
                </button>
            </div>
        </section>

        <section>
            <div class="mt-3 bg-white p-4 shadow-sm rounded-lg">
                <div class="flex justify-between items-center">

                    <!-- Left side -->
                    <div class="flex items-center gap-3">
                        <img src="./assets/Aperture.png" alt="" class="w-8 h-8 p-1 bg-blue-50 rounded-full">
                        <div>
                            <h1 id="count-issues" class="font-semibold">50 Issues</h1>
                            <p class="text-sm text-gray-500">Track and manage your project issues</p>
                        </div>
                    </div>

                    <!-- Right side -->
                    <div class="flex items-center gap-4">
                        <div class="flex items-center gap-1">
                            <img src="./assets/Open-Status.png" alt="" class="w-5">
                            <span class="text-sm">Open</span>
                        </div>

                        <div class="flex items-center gap-1">
                            <img src="./assets/Closed- Status .png" alt="" class="w-5">
                            <span class="text-sm">Closed</span>
                        </div>
                    </div>

                </div>
            </div>
        </section>

        <!-- loading spinner -->
        <div id="loadingSpinner" class="h-[60vh] flex hidden justify-center items-center">
            <span class="loading loading-dots loading-xl"></span>
        </div>

        <!-- card Issues section -->
        <section>
            <div id="issues-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 bg-white p-6 mt-0.5">
                <!-- card dynamically added here -->
            </div>
        </section>

        <!-- modal section -->
        <section>
            <!-- Open the modal using ID.showModal() method -->
            <dialog id="modal" class="modal">
                <div id="modal-box" class="modal-box max-w-3xl p-0">
                    <!-- dynamic modal content will come here -->

    </main>
    <script src="./script/script.js"></script>
</body>

</html>
