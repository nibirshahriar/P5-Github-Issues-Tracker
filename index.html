<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issues Tracker | Login</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <!-- tailwind+daisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center bg-gray-100">
    <div class="max-w-md w-full bg-white shadow-xl rounded-lg p-6">

        <div class="mx-auto text-center">
            <img src="./assets/github-logo.png" alt="" class="mx-auto w-16 mb-3">
            <h1 class="text-xl font-semibold">GitHub Issues Tracker</h1>
            <h3 class="text-gray-500 text-sm">Sign in to manage your issues</h3>
        </div>
        <div>
            <fieldset class="fieldset rounded-box w-full p-4 space-y-2">
                <!-- <legend class="fieldset-legend">Login</legend> -->

                <label class="label font-medium text-black">Username</label>
                <input id="input-text" type="text" class="input w-full" placeholder="Enter Username" />

                <label class="label text-black font-medium">Password</label>
                <input id="input-password" type="password" class="input w-full" placeholder="Enter Password" />

                <button id="btn-signin" class="btn btn-primary mt-4">Sign In</button>
            </fieldset>
        </div>
        <div class="text-center">
            <div class="divider">OR</div>
            <h1 class="text-gray-400">Demo Credentials:</h1>
            <div class="bg-[#F8FAFC] p-6 font-bold text-[#1F2937]">
                <p>Username: admin</p>
                <p>Password: admin123</p>
            </div>
        </div>
    </div>
    <script src="./script/login.js"></script>
</body>

</html>
